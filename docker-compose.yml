version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: clinical_backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./backend/data:/app/data
    networks:
      - clinical_net

  frontend:
    build:
      context: ./frontend
    container_name: clinical_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - clinical_net

networks:
  clinical_net:
    driver: bridge